<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" type="module" defer></script>
</head>

<body>
  <main>
  <div class = "card">

  <div class = "top-card">
  <p class="txt-header">Your Result</p>

  <div class="top-circle"><p class="txt-score">76</p> <p class="txt-percent">of 100</p></div>

  <p class="txt-rating">Great</p>
  <p class="txt-brag">You scored higher than 65% of the people who have taken these tests.</p>

  </div>

  <div class = "bottom-card">
    
  <p class="txt-summary">Summary</p>
  
  <div class="bottom-trait reaction-score">
  <Img class = "bottom-image" src="assets/images/icon-reaction.svg">
  <p class="attribute">Reaction</p>
  <p class="txt-trait-score">80 </p>
  <p class ="extend-tts">/ 100</p>
  </div>

  <div class="bottom-trait memory-score">
  <Img class = "bottom-image" src="assets/images/icon-memory.svg">
  <p class="attribute">Memory</p>
  <p class="txt-trait-score">92 </p>
  <p class ="extend-tts">/ 100</p>
  </div>

  <div class="bottom-trait verbal-score">
  <Img class = "bottom-image" src="assets/images/icon-verbal.svg">
  <p class="attribute">Verbal</p>
  <p class="txt-trait-score">61 </p>
  <p class ="extend-tts">/ 100</p>
  </div>

  <div class="bottom-trait visual-score">
  <Img class = "bottom-image" src="assets/images/icon-visual.svg">
  <p class="attribute">Visual</p>
  <p class="txt-trait-score">72 </p>
  <p class ="extend-tts">/ 100</p>
  </div>

  <button class = "next">Continue</button>
  </div>
  </div>
  </main>
</body>
<link rel="stylesheet" href="style.css">
</html>
